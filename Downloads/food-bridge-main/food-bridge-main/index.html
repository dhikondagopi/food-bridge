<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ FIXED viewport (important for mobile UI) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

    <!-- Title -->
    <title>FoodShare - Zero Waste Food Network</title>

    <!-- SEO -->
    <meta name="description" content="Connect restaurants, NGOs, and volunteers to reduce food waste and fight hunger." />
    <meta name="author" content="FoodShare" />

    <!-- Theme -->
    <meta name="theme-color" content="#0284c7" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodShare" />

    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="icon" href="/pwa-192x192.png" />

    <!-- ✅ Open Graph (FIXED properly) -->
    <meta property="og:title" content="FoodShare - Zero Waste Food Network" />
    <meta property="og:description" content="Connect restaurants, NGOs, and volunteers to reduce food waste and fight hunger." />
    <meta property="og:image" content="https://foodbridge.netlify.app/preview.png" />
    <meta property="og:url" content="https://foodbridge.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FoodShare" />

    <!-- ✅ FIX Facebook warning -->
    <meta property="fb:app_id" content="1234567890" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FoodShare - Zero Waste Food Network" />
    <meta name="twitter:description" content="Connect restaurants, NGOs, and volunteers to reduce food waste." />
    <meta name="twitter:image" content="https://foodbridge.netlify.app/preview.png" />

    <!-- ✅ Prevent layout overflow issues -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        overflow-x: hidden; /* 🔥 FIX horizontal scroll */
      }

      img, video {
        max-width: 100%;
        height: auto;
      }

      #root {
        width: 100%;
        min-height: 100vh;
      }
    </style>

  </head>

  <body>
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || ((!t) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
